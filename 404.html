<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — 页面未找到</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: linear-gradient(160deg, #f0fdfa 0%, #f8fafc 50%, #fafeff 100%);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
  }
  .card {
    background: #fff; border: 1px solid #e2e8f0; border-radius: 16px;
    padding: 48px; text-align: center; max-width: 440px; width: 90%;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
  }
  .code {
    font-size: 72px; font-weight: 700; color: #0d9488;
    line-height: 1; margin-bottom: 12px;
  }
  h1 { font-size: 18px; color: #1e293b; margin-bottom: 8px; }
  p { font-size: 14px; color: #64748b; margin-bottom: 24px; line-height: 1.6; }
  a {
    display: inline-flex; align-items: center; gap: 6px;
    background: #0d9488; color: #fff; text-decoration: none;
    padding: 10px 24px; border-radius: 8px; font-size: 14px; font-weight: 500;
    transition: background .15s;
  }
  a:hover { background: #0f766e; }
  .icon { font-size: 48px; margin-bottom: 16px; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">🧪</div>
  <div class="code">404</div>
  <h1>页面未找到</h1>
  <p>这个观察点不存在。<br>也许它已经被完成了，或者地址有误。</p>
  <a href="/">&#8592; 返回实验室观察管理系统</a>
</div>
</body>
</html>
