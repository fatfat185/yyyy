<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="flask" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="liquid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5eead4" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- 烧瓶主体 -->
  <path d="M35 20 L35 42 L18 78 Q15 88 22 92 L78 92 Q85 88 82 78 L65 42 L65 20 Z"
        fill="url(#flask)" stroke="#0f766e" stroke-width="2"/>

  <!-- 瓶颈高光 -->
  <path d="M38 22 L38 42 L62 42 L62 22" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="3"/>

  <!-- 液体 -->
  <path d="M24 72 Q22 82 28 88 L72 88 Q78 82 76 72 Q60 66 50 68 Q40 66 24 72 Z"
        fill="url(#liquid)"/>

  <!-- 气泡 -->
  <circle cx="42" cy="72" r="3" fill="rgba(255,255,255,0.4)"/>
  <circle cx="55" cy="78" r="2" fill="rgba(255,255,255,0.3)"/>
  <circle cx="48" cy="68" r="1.5" fill="rgba(255,255,255,0.35)"/>

  <!-- 刻度标记 -->
  <line x1="66" y1="50" x2="70" y2="50" stroke="#0f766e" stroke-width="1.5"/>
  <line x1="66" y1="56" x2="70" y2="56" stroke="#0f766e" stroke-width="1.5"/>
  <line x1="66" y1="62" x2="70" y2="62" stroke="#0f766e" stroke-width="1.5"/>
</svg>
